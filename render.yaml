services:
  - type: web
    name: pilotbot-engine
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        sync: false
      - key: SB_URL
        sync: false
      - key: SB_KEY
        sync: false
      - key: GEMINI_KEY
        sync: false
      - key: GROQ_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: PAYPAL_MODE
        value: live
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: WEBSITE_URL
        value: https://pilotstaff.com
      - key: RESEND_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
